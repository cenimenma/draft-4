name: 🤖 Argus Auto Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

# Permissions for GitHub API
permissions:
  pull-requests: write
  contents: read

jobs:
  auto-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch full history for diff
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changesets@v1
      with:
        separator: ','
    
    - name: Debug - Show changed files
      run: |
        echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
        echo "PR Number: ${{ github.event.pull_request.number }}"
        echo "Repository: ${{ github.repository }}"
    
    - name: Run Argus Auto Review
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        ARGUS_API_URL: ${{ secrets.ARGUS_API_URL || 'https://your-api-domain.com' }}
      run: |
        echo "🚀 Starting Argus Auto Review..."
        echo "PR: #${{ github.event.pull_request.number }}"
        echo "Repo: ${{ github.repository }}"
        
        # For demo purposes, run with mock data
        # In production, you would:
        # 1. Extract actual diffs from the PR
        # 2. Send to your Argus API
        # 3. Post results as PR comment
        
        python auto_review.py
        
    - name: Upload review results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: review-results
        path: review_output.json
        retention-days: 7
